---
- name: Check if k9s is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k9s
  register: k9s_binary

- name: Download k9s tarball
  ansible.builtin.get_url:
    url: https://github.com/derailed/k9s/releases/latest/download/k9s_Linux_amd64.tar.gz
    dest: /tmp/k9s.tar.gz
    mode: '0644'
  when: not k9s_binary.stat.exists

- name: Install k9s binary
  ansible.builtin.unarchive:
    src: /tmp/k9s.tar.gz
    dest: /usr/local/bin
    remote_src: true
    include:
      - k9s
  when: not k9s_binary.stat.exists

- name: Remove k9s tarball
  ansible.builtin.file:
    path: /tmp/k9s.tar.gz
    state: absent
  when: not k9s_binary.stat.exists
