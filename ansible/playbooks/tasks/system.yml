---
- name: Extend LVM logical volume to use full volume group
  ansible.builtin.command:
    cmd: lvextend -l +100%FREE /dev/ubuntu-vg/ubuntu-lv
  register: lvextend_result
  changed_when: "'successfully resized' in lvextend_result.stdout"
  failed_when: lvextend_result.rc != 0 and 'matches existing size' not in lvextend_result.stderr

- name: Resize filesystem to fill logical volume
  ansible.builtin.command:
    cmd: resize2fs /dev/ubuntu-vg/ubuntu-lv
  register: resize2fs_result
  changed_when: "'Nothing to do' not in resize2fs_result.stdout"

- name: Get current timezone
  ansible.builtin.command:
    cmd: timedatectl show --property=Timezone --value
  register: current_tz
  changed_when: false

- name: Set timezone to America/Chicago
  ansible.builtin.command:
    cmd: timedatectl set-timezone America/Chicago
  when: current_tz.stdout != 'America/Chicago'
  changed_when: true

- name: Enable automatic security updates
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started

- name: Enable and start unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Disable Ubuntu motd ads
  ansible.builtin.lineinfile:
    path: /etc/default/motd-news
    regexp: '^ENABLED='
    line: 'ENABLED=0'

- name: Disable systemd-motd timer (best effort)
  ansible.builtin.systemd:
    name: motd-news
    state: stopped
    enabled: false
  failed_when: false

- name: Disable help text in motd (best effort)
  ansible.builtin.file:
    path: /etc/update-motd.d/10-help-text
    mode: '0644'
  failed_when: false

- name: Filter ESM ads from updates motd
  ansible.builtin.copy:
    dest: /etc/update-motd.d/90-updates-available
    mode: '0755'
    content: |
      #!/bin/sh
      /usr/lib/update-notifier/apt-check --human-readable 2>&1 \
        | grep -v -E "ESM|ubuntu\.com|pro status|Expanded Security Maintenance"

- name: Disable ESM motd (best effort)
  ansible.builtin.file:
    path: /etc/update-motd.d/91-contract-ua-esm-status
    mode: '0644'
  failed_when: false
