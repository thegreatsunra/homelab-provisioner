---
- name: Get current timezone
  ansible.builtin.command:
    cmd: timedatectl show --property=Timezone --value
  register: current_tz
  changed_when: false

- name: Set timezone to America/Chicago
  ansible.builtin.command:
    cmd: timedatectl set-timezone America/Chicago
  when: current_tz.stdout != 'America/Chicago'
  changed_when: true

- name: Enable automatic security updates
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'

- name: Enable and start auditd
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started

- name: Enable and start unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Disable Ubuntu motd ads
  ansible.builtin.lineinfile:
    path: /etc/default/motd-news
    regexp: '^ENABLED='
    line: 'ENABLED=0'

- name: Disable systemd-motd timer (best effort)
  ansible.builtin.systemd:
    name: motd-news
    state: stopped
    enabled: false
  failed_when: false

- name: Disable help text in motd (best effort)
  ansible.builtin.file:
    path: /etc/update-motd.d/10-help-text
    mode: '0644'
  failed_when: false

- name: Disable ESM motd (best effort)
  ansible.builtin.file:
    path: /etc/update-motd.d/91-contract-ua-esm-status
    mode: '0644'
  failed_when: false
