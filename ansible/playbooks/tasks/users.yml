---
- name: Configure passwordless sudo
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/{{ ssh_user }}
    line: "{{ ssh_user }} ALL=(ALL:ALL) NOPASSWD:ALL"
    create: true
    mode: '0440'
    owner: root
    group: root
    validate: visudo -cf %s

- name: Check if Oh My Zsh is installed
  ansible.builtin.stat:
    path: "/home/{{ ssh_user }}/.oh-my-zsh"
  register: oh_my_zsh
  become: false

- name: Install Oh My Zsh
  ansible.builtin.shell:
    cmd: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
  when: not oh_my_zsh.stat.exists
  become: false
  changed_when: true

- name: Install zsh aliases
  ansible.builtin.copy:
    dest: "/home/{{ ssh_user }}/.oh-my-zsh/custom/aliases.zsh"
    owner: "{{ ssh_user }}"
    group: "{{ ssh_user }}"
    mode: '0644'
    content: |
      alias aliases='pico ~/.oh-my-zsh/custom/aliases.zsh'
      alias d='sudo docker'
      alias h='sudo -E helm'
      alias k='sudo k3s kubectl'
      alias kga='sudo k3s kubectl get --all-namespaces'
  become: false

- name: Set zsh as default shell
  ansible.builtin.user:
    name: "{{ ssh_user }}"
    shell: /usr/bin/zsh
